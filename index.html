<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28 years on earth</title>
    <style>
        /* black theme and garamond font */
        body { 
            font-family: "Garamond", "Georgia", serif; 
            background: #000000; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px 20px 100px 20px; 
            text-align: center; 
        }
        h1 { font-weight: normal; margin-bottom: 5px; letter-spacing: 1px; }
        .alt-baslik { color: #888; font-size: 1.1rem; margin-bottom: 20px;}
        
        /* müzik oynatmaca */
        .muzik-kutusu { margin: 10px auto 40px auto; max-width: 360px; background: #111; padding: 8px; border-radius: 0px; }
        .muzik-kutusu iframe { width: 100%; height: 80px; border: none; }
        
        /* galeri tasarımı estetik */
        .galeri { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .foto-kart { background: #111; min-height: 250px; padding: 0; border-radius: 0px; border: none; transition: transform 0.2s; cursor: pointer; }
        .foto-kart:hover { transform: scale(1.02); }
        img { width: 100%; height: 100%; border-radius: 0px; object-fit: cover; display: block; }
        
        /* katılımcı kutusu */
        .katilimcilar { 
            position: relative; 
            max-width: 1200px; 
            margin: 50px auto 0 auto; 
            text-align: right; 
            font-size: 0.95rem; 
            color: #888; 
            border-top: 1px solid #222; 
            padding-top: 20px;  
        }
        
        /* lightbox büyütme ekranı */
        .lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .lightbox img { max-width: 90%; max-height: 90%; width: auto; object-fit: contain; border-radius: 0px; }
        .lightbox:target { display: flex; }
        .kapat-butonu { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; text-decoration: none; font-weight: 100; }
    </style>
</head>
<body>

    <!-- başlık ve müzik sayfa düzeni -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start; max-width: 1200px; margin: 0 auto 40px auto; text-align: left;">
        <div>
            <h1 style="margin: 0; font-weight: normal; letter-spacing: 1px;">snippets, 2026</h1>
            <div class="alt-baslik" style="margin: 5px 0 0 0; max-width: 800px;">discover the harmonious traces of your moments filled with attention, curiosity, and chatter as we mark the 28th year of my presence on planet earth.</div>
        </div>

        <!--  MP3 oynatıcı -->
        <div style="margin: 0;">
            <button id="muzik-butonu" onclick="muzikCal()" style="background: none; color: #888; text-decoration: none; font-size: 1rem; border: 1px solid #333; padding: 8px 15px; letter-spacing: 1px; cursor: pointer; font-family: 'Garamond', serif; transition: 0.2s;" onmouseover="this.style.color='#fff'; this.style.borderColor='#fff'" onmouseout="this.style.color='#888'; this.style.borderColor='#333'">müzikçik</button>
            
            <!-- ses dosyası burada -->
            <audio id="yerel-ses" loop>
                <source src="arka-plan.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <!-- gallery -->
    <div class="galeri">
        <div class="foto-kart" onclick="acLightbox(0)"><img src="Tarama_20260716.png"></div>
        <div class="foto-kart" onclick="acLightbox(1)"><img src="Tarama_20260716 (2).png"></div>
        <div class="foto-kart" onclick="acLightbox(2)"><img src="Tarama_20260716 (3).png"></div>
        <div class="foto-kart" onclick="acLightbox(3)"><img src="Tarama_20260716 (4).png"></div>
        <div class="foto-kart" onclick="acLightbox(4)"><img src="Tarama_20260716 (5).png"></div>
        <div class="foto-kart" onclick="acLightbox(5)"><img src="Tarama_20260716 (6).png"></div>     
        <div class="foto-kart" onclick="acLightbox(6)"><img src="Tarama_20260716 (7).png"></div>
        <div class="foto-kart" onclick="acLightbox(7)"><img src="Tarama_20260716 (8).png"></div>
        <div class="foto-kart" onclick="acLightbox(8)"><img src="Tarama_20260716 (9).png"></div>
    </div>

    <!-- Dinamik Büyüyen Ekran  -->
    <div id="galeri-lightbox" class="lightbox" onclick="kapatLightbox(event)">
        <a href="javascript:void(0)" class="kapat-butonu" onclick="kapatLightbox(null)">&times;</a>
        <img id="lightbox-img" src="">
    </div>

    <!-- Sağ Alttaki Katılımcı Satırı -->
    <div class="katilimcilar">
        <p><strong>special thanks: </strong> ada, aybegüm, azad, chili, gökay, juan, leon, luuk, maria, mathis, natalia, paulina, püren, onur, ugo</p>
    </div>

    <!-- Klavye ve Geçiş Kontrollerini Sağlayan Akıllı Kodlar -->
    <script>
        const fotograflar = ["Tarama_20260716.png", "Tarama_20260716 (2).png", "Tarama_20260716 (3).png", "Tarama_20260716 (4).png", "Tarama_20260716 (5).png", "Tarama_20260716 (6).png", "Tarama_20260716 (7).png", "Tarama_20260716 (8).png", "Tarama_20260716 (9).png"];
        let mevcutIndeks = -1;

        function muzikCal() {
            const ses = document.getElementById("yerel-ses");
            const buton = document.getElementById("muzik-butonu");
            
            if (ses.paused) {
                ses.play().then(() => {
                    buton.textContent = "stop";
                    buton.style.color = "#fff";
                    buton.style.borderColor = "#fff";
                }).catch(error => {
                    console.log("Oynatma engellendi veya dosya bulunamadı:", error);
                });
            } else {
                ses.pause();
                buton.textContent = "müzikçik";
                buton.style.color = "#888";
                buton.style.borderColor = "#333";
            }
        }
        
        function acLightbox(indeks) {
            mevcutIndeks = indeks;
            document.getElementById("lightbox-img").src = fotograflar[mevcutIndeks];
            document.getElementById("galeri-lightbox").style.display = "flex";
        }

        function kapatLightbox(e) {
            if (e === null || e.target.id === "galeri-lightbox" || e.target.className === "kapat-butonu") {
                document.getElementById("galeri-lightbox").style.display = "none";
                mevcutIndeks = -1;
            }
        }

        // Klavye Tuşlarını Dinleyen Fonksiyon (ESC, Sağ ve Sol Ok Tuşları)
        document.addEventListener("keydown", function(event) {
            if (mevcutIndeks === -1) return;

            if (event.key === "Escape") {
                kapatLightbox(null);
            } else if (event.key === "ArrowRight") {
                mevcutIndeks = (mevcutIndeks + 1) % fotograflar.length;
                document.getElementById("lightbox-img").src = fotograflar[mevcutIndeks];
            } else if (event.key === "ArrowLeft") {
                mevcutIndeks = (mevcutIndeks - 1 + fotograflar.length) % fotograflar.length;
                document.getElementById("lightbox-img").src = fotograflar[mevcutIndeks];
            }
        });
    </script>
</body>
</html>
