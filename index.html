<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deneme hatıralar</title>
    <style>
        /* Siyah Tema ve Minimal Garamond Fontu */
        body { 
            font-family: "Garamond", "Georgia", serif; 
            background: #000000; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px 20px 100px 20px; 
            text-align: center; 
        }
        h1 { font-weight: normal; margin-bottom: 5px; letter-spacing: 1px; }
        .alt-baslik { color: #888; font-size: 1.1rem; margin-bottom: 20px; font-style: italic; }
        
        /* YouTube Oynatıcı */
        .muzik-kutusu { margin: 10px auto 40px auto; max-width: 360px; background: #111; padding: 8px; border-radius: 0px; }
        .muzik-kutusu iframe { width: 100%; height: 80px; border: none; }
        
        /* Çerçevesiz, Ayrık ve Sivri Köşeli Galeri */
        .galeri { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .foto-kart { background: none; padding: 0; border-radius: 0px; border: none; transition: transform 0.2s; cursor: pointer; }
        .foto-kart:hover { transform: scale(1.02); }
        img { width: 100%; height: auto; border-radius: 0px; object-fit: cover; display: block; }
        
        /* Sağ Altta Duran Katılımcı Kutusu */
        .katilimcilar { 
            position: relative; 
            max-width: 1200px; 
            margin: 50px auto 0 auto; 
            text-align: right; 
            font-size: 0.95rem; 
            color: #888; 
            border-top: 1px solid #222; 
            padding-top: 20px; 
        }
        
        /* Lightbox Büyütme Ekranı */
        .lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .lightbox img { max-width: 90%; max-height: 90%; width: auto; object-fit: contain; border-radius: 0px; }
        .lightbox:target { display: flex; }
        .kapat-butonu { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; text-decoration: none; font-weight: 100; }
    </style>
</head>
<body>

        <!-- Başlık Sol Üstte, YouTube Oynatıcı Sağ Üstte -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start; max-width: 1200px; margin: 0 auto 40px auto; text-align: left;">
        <div>
            <h1 style="margin: 0; font-weight: normal; letter-spacing: 1px;">selamcikkkkkkkk</h1>
            <div class="alt-baslik" style="margin: 5px 0 0 0;">28 yaş hatırasıııı</div>
        </div>

        <!-- YouTube Müzik Kutusu tasarımı -->
        <div class="muzik-kutusu" style="margin: 0; max-width: 200px;">
            <iframe src="https://youtube-nocookie.com" frameborder="0" allow="autoplay; encrypted-media" style="width: 200px; height: 40px;"></iframe>
        </div>
    </div>



    <!-- Galeri Alanı -->
    <div class="galeri">
        <div class="foto-kart" onclick="acLightbox(0)"><img src="saint-moritz-1929.jpg!Large.jpg"></div>
        <div class="foto-kart" onclick="acLightbox(1)"><img src="sleeping-woman-1935.jpg!Large.jpg"></div>
        <div class="foto-kart" onclick="acLightbox(2)"><img src="the-girls.jpg!Large.jpg"></div>
    </div>

    <!-- Dinamik Büyüyen Ekran (Tek Bir Ortak Kutuya İndirgedik) -->
    <div id="galeri-lightbox" class="lightbox" onclick="kapatLightbox(event)">
        <a href="javascript:void(0)" class="kapat-butonu" onclick="kapatLightbox(null)">&times;</a>
        <img id="lightbox-img" src="">
    </div>

    <!-- Sağ Alttaki Katılımcı Satırı -->
    <div class="katilimcilar">
        <p><strong>Katılımcılar:</strong> ayşe fatma hayriye.</p>
    </div>

    <!-- Klavye ve Geçiş Kontrollerini Sağlayan Akıllı Kodlar -->
    <script>
        const fotograflar = ["saint-moritz-1929.jpg!Large.jpg", "sleeping-woman-1935.jpg!Large.jpg", "the-girls.jpg!Large.jpg"];
        let mevcutIndeks = -1;

        function acLightbox(indeks) {
            mevcutIndeks = indeks;
            document.getElementById("lightbox-img").src = fotograflar[mevcutIndeks];
            document.getElementById("galeri-lightbox").style.display = "flex";
        }

        function kapatLightbox(e) {
            if (e === null || e.target.id === "galeri-lightbox") {
                document.getElementById("galeri-lightbox").style.display = "none";
                mevcutIndeks = -1;
            }
        }

        // Klavye Tuşlarını Dinleyen Fonksiyon (ESC, Sağ ve Sol Ok Tuşları)
        document.addEventListener("keydown", function(event) {
            if (mevcutIndeks === -1) return; // Eğer büyük ekran açık değilse çalışma

            if (event.key === "Escape") {
                kapatLightbox(null);
            } else if (event.key === "ArrowRight") {
                // Sağ oka basınca sonraki resme geç
                mevcutIndeks = (mevcutIndeks + 1) % fotograflar.length;
                document.getElementById("lightbox-img").src = fotograflar[mevcutIndeks];
            } else if (event.key === "ArrowLeft") {
                // Sol oka basınca önceki resme geç
                mevcutIndeks = (mevcutIndeks - 1 + fotograflar.length) % fotograflar.length;
                document.getElementById("lightbox-img").src = fotograflar[mevcutIndeks];
            }
        });
    </script>

</body>
</html>
