<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deneme-hatıra</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #333; margin-bottom: 30px; }
        .galeri { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .foto-kart { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .foto-kart:hover { transform: scale(1.03); }
        img { width: 100%; height: auto; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>

    <h1>Hatıralar</h1>

    <div class="galeri">
        <div class="foto-kart"><img src="saint-moritz-1929.jpg!Large.jpg"></div>
        <div class="foto-kart"><img src="sleeping-woman-1935.jpg!Large.jpg"></div>
        <div class="foto-kart"><img src="the-girls.jpg!Large.jpg"></div>
    </div>

</body>
</html>
